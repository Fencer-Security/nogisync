# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Sync Markdown in Github to Notion
description: Sync markdown changes in Github to Notion
author: Fencer Inc <hello@fencer.dev>
branding:
  color: purple
  icon: book-open
inputs:
  notion_api_key:
    description: 'Notion integration token'
    required: true
  docs_path:
    description: 'Directory containing the markdown files to sync'
    required: true
  notion_parent_page_id:
    description: 'Notion parent page id'
    required: true
  sync_method:
    description: "Sync method: 'blocks' (convert to Notion blocks) or 'markdown' (use Notion markdown API)"
    required: false
    default: 'blocks'
  fail_on_error:
    description: 'Fail the action if any page fails to sync'
    required: false
    default: 'false'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - "nogisync"
    - "--token"
    - ${{ inputs.notion_api_key }}
    - "--path"
    - ${{ inputs.docs_path }}
    - "--parent-page-id"
    - ${{ inputs.notion_parent_page_id }}
    - "--sync-method"
    - ${{ inputs.sync_method }}
    - ${{ inputs.fail_on_error == 'true' && '--fail-on-error' || '--no-fail-on-error' }}
