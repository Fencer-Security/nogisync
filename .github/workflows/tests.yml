---
name: Run Lint & Tests
on:
    pull_request:
    push:
        branches:
          - main

permissions:
    contents: read

jobs:
    code-style:
        name: Check code style
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          - name: Set up Python 3.14
            uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
            with:
                python-version: 3.14
                cache: pip
                cache-dependency-path: |
                    uv.lock
          - name: Run pre-commit hooks
            uses: j178/prek-action@19250435f1b20ad798baeae3adde32de0bda70b1 # v2.0.0
    mypy:
        name: Run mypy
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
          - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          - name: Install uv
            uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
            with:
                enable-cache: true
                version: latest
          - name: Install Dependencies
            run: |
                uv sync --locked
          - name: Run mypy
            run: |
                uv run mypy .
    tests:
        name: Run tests
        runs-on: ubuntu-latest
        timeout-minutes: 60
        permissions:
            pull-requests: write
            contents: read
        steps:
          - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          - name: Install uv
            uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
            with:
                enable-cache: true
                version: latest
          - name: Install Python Dependencies
            run: |
                uv sync --locked
          - name: Run Tests
            run: uv run pytest
          - name: Process Coverage Report
            run: |
                uv run coverage html --skip-covered --skip-empty

                # Report and write to summary.
                uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

                # Generate a comment for the PR
                echo -e "## Code Coverage Report\n<details>\n  <summary>Coverage Report</summary>\n" > comment.md
                cat $GITHUB_STEP_SUMMARY | sed -e 's/^/  /' >> comment.md
                echo -e "\n</details>" >> comment.md
                echo -e "\nTotal Coverage: " >> comment.md
                cat $GITHUB_STEP_SUMMARY | tail -3 | head -1 | awk -F '|' '{print $7}' | sed -e 's/ //' >> comment.md

                # Report again and fail if under 80%.
                uv run coverage report --fail-under=80
          - name: Comment on PR
            uses: Fencer-Security/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b
            if: ${{ github.event_name == 'pull_request' }}
            with:
                file-path: comment.md
                comment-tag: coverage-comment
          - name: Upload HTML report if check failed.
            uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
            if: ${{ failure() }}
            with:
                name: html-report
                path: htmlcov
